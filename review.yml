name: Politecnico di Milano
description: Politecnico di Milano public developer/API footprint review for APIs.json cataloging.
url: https://raw.githubusercontent.com/api-evangelist/politecnico-di-milano/refs/heads/main/review.yml
created: '2026-06-03'
modified: '2026-06-03'
reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      Politecnico di Milano has no consolidated public developer portal. The one
      clearly live, standards-based public API is the IRIS Re.Public@Polimi
      OAI-PMH endpoint, which I verified returns a valid OAI-PMH 2.0 Identify
      response ("IRIS - POLIMI - prod", CINECA) and a 200 on ListMetadataFormats.
      An open data portal at opendata.polimi.it resolves but exposes no
      documented programmatic API (CKAN/Socrata/data.json probes all 404). A
      Shibboleth/SAML2 IdP (shibidp.polimi.it, IDEM/GARR federation) resolves and
      provides federated SSO but is an auth service, not a data API. A previously
      referenced GPKB bioinformatics REST API (bioinformatics.deib.polimi.it)
      now returns 404. Community wrappers of the mobile-app/online-services
      backend exist on GitHub but are unofficial and archived; no official
      endpoints were fabricated. No official Politecnico GitHub org confirmed
      (the github.com/POLIMI account is unrelated student forks).
    endpoints:
      - url: https://re.public.polimi.it/oai/request?verb=Identify
        status: 200
        note: Live OAI-PMH 2.0; valid Identify XML, repositoryName "IRIS - POLIMI - prod".
      - url: https://re.public.polimi.it/oai/request?verb=ListMetadataFormats
        status: 200
        note: OAI-PMH metadata formats endpoint responds.
      - url: https://opendata.polimi.it/
        status: 200
        note: Open data portal resolves; no documented programmatic API.
      - url: https://opendata.polimi.it/api/3/action/package_list
        status: 404
        note: CKAN API probe failed; portal is not CKAN-backed.
      - url: https://opendata.polimi.it/data.json
        status: 404
        note: No data.json catalog endpoint.
      - url: https://shibidp.polimi.it/idp/shibboleth
        status: 200
        note: Shibboleth SAML2 IdP metadata; IDEM (GARR) federation SSO.
      - url: https://www.polimi.it/en/
        status: 200
        note: Official institutional website (English).
      - url: https://www.polimi.it/onlineservices
        status: 307
        note: Online services / authentication entry; redirects to login.
      - url: https://www.bioinformatics.deib.polimi.it/GPKB-REST/
        status: 404
        note: Previously documented GPKB REST API now dead.
      - url: https://www.linkedin.com/school/polimi/
        status: 200
        note: Official LinkedIn school page.
