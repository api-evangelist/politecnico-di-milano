---
aid: politecnico-di-milano
name: Politecnico di Milano
description: >-
  Politecnico di Milano is Italy's largest technical university, focused on
  engineering, architecture, and design, and ranked #111 in the QS World
  University Rankings 2025. Its public, machine-readable developer footprint is
  limited and not consolidated into a single developer portal. The most
  concrete public API surface is the OAI-PMH metadata endpoint of its IRIS
  Re.Public@Polimi institutional research repository (CINECA platform), an open
  data portal at opendata.polimi.it (browse/download, with no documented
  programmatic API), and a Shibboleth/SAML2 identity provider participating in
  the Italian IDEM (GARR) federation. Most student-facing service APIs (online
  services / mobile app backends) are gated behind authentication and are not
  publicly documented.
type: Index
