apis:
  - aid: politecnico-di-milano:iris-oai-pmh
    name: IRIS Re.Public@Polimi OAI-PMH
    description: >-
      Public OAI-PMH 2.0 metadata harvesting endpoint for the IRIS
      Re.Public@Polimi institutional research repository (CINECA platform). The
      endpoint resolves and returns a valid Identify response naming the
      repository "IRIS - POLIMI - prod" with Dublin Core and other metadata
      formats available via ListMetadataFormats. Supports standard OAI-PMH verbs
      (Identify, ListMetadataFormats, ListRecords, ListSets, GetRecord).
    humanURL: https://re.public.polimi.it/
    baseURL: https://re.public.polimi.it/oai/request
    tags: [ Research, Repository, OAI-PMH, Open Access, IRIS, Metadata ]
    properties:
      - type: Documentation
        url: https://re.public.polimi.it/
      - type: API
        url: https://re.public.polimi.it/oai/request?verb=Identify
  - aid: politecnico-di-milano:open-data
    name: Politecnico di Milano Open Data Portal
    description: >-
      Institutional open data portal (opendata.polimi.it) publishing the
      university's public datasets. The portal resolves and serves dataset
      browsing and download, but exposes no documented programmatic API at the
      time of review (CKAN package_list, Socrata, and data.json probes returned
      404). Listed as a data access point rather than a confirmed machine API.
    humanURL: https://opendata.polimi.it/
    tags: [ Open Data, Datasets, Research ]
    properties:
      - type: Documentation
        url: https://opendata.polimi.it/
  - aid: politecnico-di-milano:shibboleth-idp
    name: Politecnico di Milano Shibboleth Identity Provider
    description: >-
      Shibboleth/SAML2 identity provider for Politecnico di Milano, serving
      federated single sign-on as part of the Italian IDEM (GARR) academic
      identity federation. The IdP metadata endpoint resolves publicly; it is an
      authentication/federation service rather than a general-purpose data API.
    humanURL: https://www.polimi.it/onlineservices
    baseURL: https://shibidp.polimi.it/idp/shibboleth
    tags: [ Identity, Authentication, SAML, Shibboleth, SSO, IDEM ]
    properties:
      - type: Documentation
        url: https://www.polimi.it/onlineservices
      - type: Authentication
        url: https://shibidp.polimi.it/idp/shibboleth
